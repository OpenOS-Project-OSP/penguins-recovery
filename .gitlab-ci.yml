# Converted from GitHub Actions — penguins-recovery
# Mirrors: ci.yml, bootloaders-upstream-sync.yaml

stages:
  - test
  - sync
  - release

default:
  image: ubuntu:22.04

# ── CI ────────────────────────────────────────────────────────────────────────
test:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
        shellcheck --severity=error "$f" || { echo "FAIL shellcheck: $f"; failed=1; }
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Bootloaders upstream sync (scheduled) ─────────────────────────────────────
# Configure a GitLab scheduled pipeline to run this periodically.
bootloaders-upstream-sync:
  stage: sync
  before_script:
    - apt-get update -qq && apt-get install -y git ca-certificates
  script:
    - |
      echo "Syncing bootloader sources from upstream..."
      bash bootloaders/create-bootloaders || true
      echo "Sync complete."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ── GitLab Release ────────────────────────────────────────────────────────────
gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'penguins-recovery $CI_COMMIT_TAG'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
